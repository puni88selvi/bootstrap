
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Business Landing Page</title>

    <!-- Bootstrap CSS -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        .hero{
            height: 90vh;
            background-image: url("img/puni.webp");
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
        }

        .overlay{
            background: rgba(0,0,0,0.5);
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
        }

    </style>

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container">

            <a class="navbar-brand fw-bold" href="#">
                Elixir
            </a>

            <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link active" href="#">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Pages</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">News</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Contact</a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- Hero Section -->

    <section class="hero">

        <div class="overlay">

            <div class="container text-white">

                <div class="row">

                    <div class="col-md-6">

                        <h1 class="display-3 fw-bold">
                            Growth Partners
                        </h1>

                        <p class="lead mt-3">
                            Connect with top consultants and grow your business easily.
                        </p>

                        <button class="btn btn-warning btn-lg mt-3">
                            Contact Us
                        </button>

                        <button class="btn btn-outline-light btn-lg mt-3 ms-2">
                            Read More
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- Services -->

    <section class="container text-center py-5">

        <div class="row">

            <div class="col-md-4">

                <h3>Business</h3>

                <p>
                    Professional consulting services.
                </p>

            </div>

            <div class="col-md-4">

                <h3>Finance</h3>

                <p>
                    Smart financial planning solutions.
                </p>

            </div>

            <div class="col-md-4">

                <h3>Marketing</h3>

                <p>
                    Modern digital marketing ideas.
                </p>

            </div>

        </div>

    </section>

    <!-- Footer -->

    <footer class="bg-dark text-white text-center p-3">

        <p>
            © 2026 Elixir Landing Page
        </p>

    </footer>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
